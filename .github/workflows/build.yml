name: Build sitemaps

on:
  schedule:
    - cron: "20 * * * *" # elk uur; Pages serveert daarna de verse sitemap
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sitemaps
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: node generate.js

      - name: Commit bijgewerkte sitemap
        run: |
          git config user.name "sitemap-bot"
          git config user.email "bot@users.noreply.github.com"
          git add news-sitemap.xml index.html
          git diff --staged --quiet || git commit -m "sitemap verversen [skip ci]"
          git pull --rebase origin main
          git push
